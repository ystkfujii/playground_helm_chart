name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  chart-release:
    name: Publish and sign OCI Helm chart
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Set chart version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          # Helm chart version must be SemVer-compatible.
          case "${version}" in
            ""|v*)
              echo "Invalid version: ${version}" >&2
              exit 1
              ;;
          esac

          chart_yaml="charts/oci-push-smoke/Chart.yaml"

          sed -i "s/0.0.0-placeholder/${version}/g" "${chart_yaml}"
          sed -i "s|SOURCE_REPOSITORY_PLACEHOLDER|https://github.com/${GITHUB_REPOSITORY}|g" "${chart_yaml}"

          echo "CHART_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "CHART_REF=ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts/oci-push-smoke" >> "${GITHUB_ENV}"

          echo "Chart version: ${version}"
          cat "${chart_yaml}"

      - name: Helm lint and package
        shell: bash
        run: |
          set -euo pipefail

          helm version
          helm lint charts/oci-push-smoke

          mkdir -p .dist
          helm package charts/oci-push-smoke --destination .dist

          echo "Packaged files:"
          ls -la .dist

      - name: Login to ghcr.io
        shell: bash
        run: |
          set -euo pipefail

          printf '%s' "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                --username "${GITHUB_ACTOR}" \
                --password-stdin

          printf '%s' "${{ secrets.GITHUB_TOKEN }}" \
            | cosign login ghcr.io \
                --username "${GITHUB_ACTOR}" \
                --password-stdin

      - name: Publish OCI Helm chart
        id: publish
        shell: bash
        run: |
          set -euo pipefail

          pkg="$(find .dist -maxdepth 1 -name 'oci-push-smoke-*.tgz' -print -quit)"
          test -n "${pkg}"

          # Important:
          # Do not include chart name or version in the OCI URL.
          # Helm infers them from the packaged chart metadata.
          helm push "${pkg}" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts" 2>&1 | tee .digest

          digest="$(awk '/Digest:/ {print $2}' .digest | tail -n1)"
          test -n "${digest}"

          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          echo "Published ${CHART_REF}@${digest}"

      - name: Sign OCI Helm chart
        shell: bash
        run: |
          set -euo pipefail

          digest="${{ steps.publish.outputs.digest }}"

          cosign sign --yes \
            -a "repo=${GITHUB_REPOSITORY}" \
            -a "workflow=${GITHUB_WORKFLOW}" \
            -a "ref=${GITHUB_SHA}" \
            -a "kind=helm-chart" \
            "${CHART_REF}@${digest}"

      - name: Verify signature
        shell: bash
        run: |
          set -euo pipefail

          digest="${{ steps.publish.outputs.digest }}"

          cosign verify \
            --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yaml@refs/tags/${GITHUB_REF_NAME}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${CHART_REF}@${digest}"

      - name: Pull chart from GHCR
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .verify
          helm pull "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts/oci-push-smoke" \
            --version "${CHART_VERSION}" \
            --destination .verify

          ls -la .verify

      - name: Template pulled chart
        shell: bash
        run: |
          set -euo pipefail

          helm template smoke-test \
            "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts/oci-push-smoke" \
            --version "${CHART_VERSION}"
