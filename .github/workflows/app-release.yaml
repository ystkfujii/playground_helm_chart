name: Release App Image

on:
  push:
    tags:
      - 'oci-push-smoke-app-v*'

jobs:
  image-release:
    name: Build and push app image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/oci-push-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Setup buildx
        shell: bash
        run: |
          set -euo pipefail
          docker buildx create --name b --driver docker-container --use

      - name: Set image version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#oci-push-smoke-app-v}"

          case "${version}" in
            ""|v*|oci-push-smoke-app-v*)
              echo "Invalid version: ${version}" >&2
              exit 1
              ;;
          esac

          echo "APP_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "Image version: ${version}"

      - name: Login to ghcr.io
        shell: bash
        run: |
          set -euo pipefail

          printf '%s' "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io \
              --username "${GITHUB_ACTOR}" \
              --password-stdin

          printf '%s' "${{ secrets.GITHUB_TOKEN }}" \
            | cosign login ghcr.io \
              --username "${GITHUB_ACTOR}" \
              --password-stdin

      - name: Build and push image
        id: build
        shell: bash
        run: |
          set -euo pipefail

          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --build-arg VERSION="${APP_VERSION}" \
            --build-arg COMMIT="${GITHUB_SHA}" \
            --build-arg DATE="${build_date}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${APP_VERSION}" \
            --tag "${IMAGE}:${APP_VERSION}" \
            --tag "${IMAGE}:latest" \
            --metadata-file .build-metadata.json \
            -f apps/oci-push-smoke/Dockerfile \
            .

          digest="$(jq -r '."containerimage.digest"' .build-metadata.json)"
          test -n "${digest}"
          test "${digest}" != "null"

          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
          echo "Published ${IMAGE}@${digest}"

      - name: Sign image
        shell: bash
        run: |
          set -euo pipefail

          digest="${{ steps.build.outputs.digest }}"

          cosign sign --yes \
            -a "repo=${GITHUB_REPOSITORY}" \
            -a "workflow=${GITHUB_WORKFLOW}" \
            -a "ref=${GITHUB_SHA}" \
            -a "kind=app-image" \
            "${IMAGE}@${digest}"

      - name: Verify signature
        shell: bash
        run: |
          set -euo pipefail

          digest="${{ steps.build.outputs.digest }}"

          cosign verify \
            --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/app-release.yaml@refs/tags/${GITHUB_REF_NAME}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE}@${digest}"
