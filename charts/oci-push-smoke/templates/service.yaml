apiVersion: v1
kind: Service
metadata:
  name: {{ include "oci-push-smoke.fullname" . }}
  labels:
    {{- include "oci-push-smoke.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "oci-push-smoke.selectorLabels" . | nindent 4 }}
